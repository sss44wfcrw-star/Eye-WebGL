<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PARAKLETOS — INTENSE MODE</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
  }
  canvas { display: block; }
  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.45);
    color: white;
    padding: 10px 12px;
    border-radius: 12px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    backdrop-filter: blur(8px);
  }
  button {
    margin-top: 6px;
    width: 100%;
    border: 0;
    border-radius: 8px;
    padding: 8px 10px;
    background: #ff6a00;
    color: white;
    font-weight: 700;
  }
</style>
</head>
<body>
<div id="hud">
  PARAKLETOS — INTENSE MODE
  <button id="burstBtn">Burst</button>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js";

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, isMobile ? 0.018 : 0.024);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 3000);
camera.position.set(0, 10, 65);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: "high-performance"
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.2 : 1.8));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.22));

const hotLight = new THREE.PointLight(0xff6a00, 3.5, 400, 2);
scene.add(hotLight);

const coolLight = new THREE.PointLight(0x66aaff, 1.3, 500, 2);
scene.add(coolLight);

// Core
const core = new THREE.Mesh(
  new THREE.SphereGeometry(3.2, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
scene.add(core);

const coreGlow = new THREE.Mesh(
  new THREE.SphereGeometry(4.6, 64, 64),
  new THREE.MeshBasicMaterial({
    color: 0xff5a00,
    transparent: true,
    opacity: 0.08
  })
);
scene.add(coreGlow);

// Disk
const disk = new THREE.Mesh(
  new THREE.TorusGeometry(9, 1.7, 36, 260),
  new THREE.MeshBasicMaterial({
    color: 0xff5a00,
    transparent: true,
    opacity: 0.72
  })
);
disk.rotation.x = Math.PI / 2;
scene.add(disk);

// Nebula shell
const nebula = new THREE.Mesh(
  new THREE.SphereGeometry(180, 32, 32),
  new THREE.MeshBasicMaterial({
    color: 0x2b003f,
    transparent: true,
    opacity: 0.05,
    side: THREE.BackSide
  })
);
scene.add(nebula);

// Starfield
let starField;
function buildStars(count) {
  if (starField) {
    scene.remove(starField);
    starField.geometry.dispose();
    starField.material.dispose();
  }
  const g = new THREE.BufferGeometry();
  const arr = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    arr[i3] = (Math.random() - 0.5) * 1400;
    arr[i3 + 1] = (Math.random() - 0.5) * 1400;
    arr[i3 + 2] = (Math.random() - 0.5) * 1400;
  }
  g.setAttribute("position", new THREE.BufferAttribute(arr, 3));
  const m = new THREE.PointsMaterial({
    size: isMobile ? 0.8 : 0.65,
    color: 0xffffff,
    transparent: true,
    opacity: 0.95
  });
  starField = new THREE.Points(g, m);
  scene.add(starField);
}
buildStars(isMobile ? 1400 : 2600);

// Particles
const N = isMobile ? 16000 : 28000;
const particleGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(N * 3);
const velocities = new Float32Array(N * 3);
const colors = new Float32Array(N * 3);
const sizes = new Float32Array(N);

for (let i = 0; i < N; i++) {
  const i3 = i * 3;
  const radius = Math.random() * 58;
  const angle = Math.random() * Math.PI * 2;
  const y = (Math.random() - 0.5) * 10;

  positions[i3] = Math.cos(angle) * radius;
  positions[i3 + 1] = y;
  positions[i3 + 2] = Math.sin(angle) * radius;

  velocities[i3] = (Math.random() - 0.5) * 0.018;
  velocities[i3 + 1] = (Math.random() - 0.5) * 0.018;
  velocities[i3 + 2] = (Math.random() - 0.5) * 0.018;

  const t = Math.min(radius / 58, 1);

  // hotter inner colors, cooler outer colors
  colors[i3] = 1.0;
  colors[i3 + 1] = 0.12 + 0.45 * (1 - t);
  colors[i3 + 2] = 0.02 + 0.9 * t;

  sizes[i] = radius < 10 ? 0.16 : radius < 25 ? 0.11 : 0.08;
}

particleGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
particleGeometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

const particleMaterial = new THREE.PointsMaterial({
  size: 0.11,
  vertexColors: true,
  transparent: true,
  opacity: 0.95,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Larger soft glow shell using duplicated points
const glowMaterial = new THREE.PointsMaterial({
  size: 0.22,
  vertexColors: true,
  transparent: true,
  opacity: 0.06,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const glowParticles = new THREE.Points(particleGeometry, glowMaterial);
scene.add(glowParticles);

const state = {
  mouseX: 0,
  mouseY: 0,
  t: 0,
  burst: 0
};

function pointerToGravity(clientX, clientY) {
  state.mouseX = (clientX / innerWidth - 0.5) * 120;
  state.mouseY = -(clientY / innerHeight - 0.5) * 120;
}

window.addEventListener("mousemove", (e) => pointerToGravity(e.clientX, e.clientY), { passive: true });
window.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  if (touch) pointerToGravity(touch.clientX, touch.clientY);
}, { passive: true });

document.getElementById("burstBtn").addEventListener("click", () => {
  state.burst = 1.0;
});

// Tuned for “intense” but still runnable
const gravity = isMobile ? 4.6 : 5.8;
const mass = isMobile ? 220 : 320;
const swirl = isMobile ? 1.25 : 1.55;
const drag = 0.992;
const eventHorizon = isMobile ? 4.2 : 5.2;

function updateParticles() {
  const pos = particleGeometry.attributes.position.array;
  const stride = isMobile ? 4 : 2;

  for (let i = 0; i < N; i += stride) {
    const i3 = i * 3;

    const x = pos[i3];
    const y = pos[i3 + 1];
    const z = pos[i3 + 2];

    const dx = -x + state.mouseX * 0.16;
    const dy = -y + state.mouseY * 0.16;
    const dz = -z;

    const r = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.001;
    const force = gravity * mass / (r * r);

    const burstBoost = 1 + state.burst * 1.8;

    velocities[i3] += (dx / r) * force * 0.0048 * burstBoost;
    velocities[i3 + 1] += (dy / r) * force * 0.0048 * burstBoost;
    velocities[i3 + 2] += (dz / r) * force * 0.0048 * burstBoost;

    const temp = velocities[i3];
    velocities[i3] = -velocities[i3 + 2] * swirl;
    velocities[i3 + 2] = temp * swirl;

    velocities[i3] *= drag;
    velocities[i3 + 1] *= drag;
    velocities[i3 + 2] *= drag;

    if (r < eventHorizon) {
      velocities[i3] *= 0.2;
      velocities[i3 + 1] *= 0.2;
      velocities[i3 + 2] *= 0.2;
    }

    pos[i3] += velocities[i3];
    pos[i3 + 1] += velocities[i3 + 1];
    pos[i3 + 2] += velocities[i3 + 2];
  }

  particleGeometry.attributes.position.needsUpdate = true;
}

function moveCamera() {
  state.t += isMobile ? 0.0018 : 0.0022;
  const radius = isMobile ? 74 : 92;

  camera.position.x = Math.sin(state.t) * radius;
  camera.position.z = Math.cos(state.t) * radius;
  camera.position.y = Math.sin(state.t * 0.7) * (isMobile ? 18 : 28);

  camera.lookAt(0, 0, 0);
}

function animate() {
  requestAnimationFrame(animate);

  updateParticles();
  moveCamera();

  disk.rotation.z += 0.012;
  nebula.rotation.y += 0.0007;

  const pulse = 1 + Math.sin(Date.now() * 0.003) * 0.14 + state.burst * 0.18;
  core.scale.setScalar(pulse);
  coreGlow.scale.setScalar(pulse * 1.05);

  hotLight.position.set(
    Math.sin(state.t * 1.6) * 14,
    8 + Math.sin(state.t * 2.1) * 5,
    Math.cos(state.t * 1.6) * 14
  );

  coolLight.position.set(
    Math.cos(state.t * 1.1) * 20,
    -6,
    Math.sin(state.t * 1.1) * 20
  );

  state.burst *= 0.96;

  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.2 : 1.8));
  renderer.setSize(innerWidth, innerHeight);
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.2 : 1.8));
renderer.setSize(innerWidth, innerHeight);
animate();
</script>
</body>
</html>
