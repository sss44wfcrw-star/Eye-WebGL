<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PARAKLETOS — Cinematic Engine</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// =========================
// SCENE
// =========================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.02);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// =========================
// LIGHT
// =========================
const light = new THREE.PointLight(0xffaa33, 3, 200);
scene.add(light);

// =========================
// BLACK HOLE
// =========================
const core = new THREE.Mesh(
  new THREE.SphereGeometry(2,64,64),
  new THREE.MeshBasicMaterial({ color:0x000000 })
);
scene.add(core);

// =========================
// ACCRETION DISK
// =========================
const disk = new THREE.Mesh(
  new THREE.TorusGeometry(8,1.5,64,200),
  new THREE.MeshBasicMaterial({
    color:0xff5500,
    transparent:true,
    opacity:0.7
  })
);
disk.rotation.x = Math.PI/2;
scene.add(disk);

// =========================
// STARFIELD
// =========================
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){
  starPos[i*3] = (Math.random()-0.5)*400;
  starPos[i*3+1] = (Math.random()-0.5)*400;
  starPos[i*3+2] = (Math.random()-0.5)*400;
}

starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));

const starMat = new THREE.PointsMaterial({
  size:0.7,
  color:0xffffff
});

scene.add(new THREE.Points(starGeo, starMat));

// =========================
// PARTICLES (ENERGY)
// =========================
const N = 1500;
const geo = new THREE.BufferGeometry();
const positions = new Float32Array(N*3);
const velocities = [];

for(let i=0;i<N;i++){
  positions[i*3] = (Math.random()-0.5)*20;
  positions[i*3+1] = (Math.random()-0.5)*20;
  positions[i*3+2] = (Math.random()-0.5)*20;

  velocities.push(new THREE.Vector3(
    (Math.random()-0.5)*0.02,
    (Math.random()-0.5)*0.02,
    (Math.random()-0.5)*0.02
  ));
}

geo.setAttribute('position', new THREE.BufferAttribute(positions,3));

const mat = new THREE.PointsMaterial({
  size:0.12,
  color:0xffaa33,
  transparent:true,
  opacity:0.9
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

// =========================
// PHYSICS
// =========================
const G = 2.0;
const mass = 40;

function update(){
  let pos = geo.attributes.position.array;

  for(let i=0;i<N;i++){
    let x = pos[i*3];
    let y = pos[i*3+1];
    let z = pos[i*3+2];

    let dx = -x;
    let dy = -y;
    let dz = -z;

    let r = Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;

    let force = G*mass/(r*r);

    velocities[i].x += dx/r*force*0.01;
    velocities[i].y += dy/r*force*0.01;
    velocities[i].z += dz/r*force*0.01;

    pos[i*3] += velocities[i].x;
    pos[i*3+1] += velocities[i].y;
    pos[i*3+2] += velocities[i].z;

    // swirl
    let temp = velocities[i].x;
    velocities[i].x = -velocities[i].z;
    velocities[i].z = temp;

    if(r < 2){
      velocities[i].multiplyScalar(0.3);
    }
  }

  geo.attributes.position.needsUpdate = true;
}

// =========================
// CAMERA
// =========================
let t = 0;

function moveCamera(){
  t += 0.0015;

  camera.position.x = Math.sin(t)*40;
  camera.position.z = Math.cos(t)*40;
  camera.position.y = Math.sin(t*0.5)*10;

  camera.lookAt(0,0,0);
}

// =========================
// LOOP
// =========================
function animate(){
  requestAnimationFrame(animate);

  update();
  moveCamera();

  disk.rotation.z += 0.01;

  core.scale.setScalar(1 + Math.sin(Date.now()*0.002)*0.05);

  renderer.render(scene,camera);
}

animate();

// =========================
window.addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
