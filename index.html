<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PARAKLĒTOS v6.0.0</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050505;
      font-family: monospace;
      color: #00ffcc;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* ===========================
       HUD / UI
    ============================ */

    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      font-size: 12px;
    }

    .telemetry {
      position: fixed;
      top: 10px;
      right: 10px;
      text-align: right;
      font-size: 12px;
    }

    .terminal {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.9);
      border-top: 1px solid #00ffcc;
    }

    .system-log {
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      font-size: 12px;
    }

    .entry {
      margin-bottom: 4px;
    }

    .input-line {
      display: flex;
      border-top: 1px solid #00ffcc;
      padding: 10px;
    }

    .input-line input {
      background: transparent;
      border: none;
      color: #00ffcc;
      width: 100%;
      outline: none;
      font-family: monospace;
    }
  </style>
</head>

<body>

  <!-- ===========================
       CANVAS (UNIVERSE)
  ============================ -->
  <canvas id="webgl-canvas"></canvas>

  <!-- ===========================
       LEFT HUD
  ============================ -->
  <div class="hud">
    <div>FPS: <span id="fps-counter">0</span></div>
  </div>

  <!-- ===========================
       RIGHT TELEMETRY
  ============================ -->
  <div class="telemetry telemetry-readout">
    <div class="tel-point">
      BACKEND: <span class="val">UNKNOWN</span>
    </div>
    <div class="tel-point">
      SOLVER: <span class="val">IDLE</span>
    </div>
  </div>

  <!-- ===========================
       TERMINAL
  ============================ -->
  <div class="terminal">
    <div id="system-log" class="system-log"></div>
    <div class="input-line">
      <span>&gt;</span>
      <input type="text" placeholder="Enter command..." />
    </div>
  </div>

  <!-- ===========================
       SCRIPT
  ============================ -->
  <script src="main.js"></script>

</body>
</html>
