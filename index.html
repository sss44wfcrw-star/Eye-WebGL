<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARAKLĒTOS — Actual System</title>

<style>
:root{
  --bg:#020202;
  --panel:rgba(16,16,20,.52);
  --line:rgba(255,255,255,.06);
  --text:#c7c7cf;
  --muted:#5f6470;
  --amber:#f59e0b;
  --green:#22c55e;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
}

.page{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.brand h1{color:#fff}
.brand p{color:var(--amber);font-size:12px}

/* MAIN */
.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

/* CANVAS */
#webgl-canvas{
  width:100%;
  height:500px;
  background:#03050a;
  border:1px solid var(--line);
}

/* SIDEBAR */
.sidebar{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  padding:15px;
}

/* STATUS */
.status{
  font-size:14px;
  color:var(--green);
}

/* TERMINAL */
.terminal{
  background:#000;
  color:#0f0;
  padding:10px;
  height:200px;
  overflow:auto;
  font-size:12px;
}

.input-line{
  display:flex;
  margin-top:10px;
}

.input-line input{
  width:100%;
  background:black;
  color:#0f0;
  border:none;
  padding:5px;
}

/* SLIDERS */
input[type=range]{width:100%}

/* BUTTONS */
button{
  margin-top:5px;
  width:100%;
  padding:8px;
  background:black;
  color:white;
  border:1px solid #333;
  cursor:pointer;
}

button:hover{
  color:var(--amber);
}
</style>
</head>

<body>

<div class="page">

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <h1>PARAKLĒTOS</h1>
    <p>v8.0.0 // actual system</p>
  </div>
  <div class="status" id="statusText">CONNECTING...</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: CANVAS -->
  <div class="panel">
    <canvas id="webgl-canvas"></canvas>
  </div>

  <!-- RIGHT: SIDEBAR -->
  <div class="sidebar">

    <!-- CONTROLS -->
    <div class="panel">
      <h3>Universe Controls</h3>

      Zoom
      <input id="zoomSlider" type="range" min="0.5" max="2" step="0.01" value="1">

      Speed
      <input id="rotationSpeedSlider" type="range" min="0" max="3" step="0.01" value="1">

      Stars
      <input id="starCountSlider" type="range" min="200" max="4000" step="50" value="1400">

      Particles
      <input id="particleCountSlider" type="range" min="50" max="1200" step="10" value="260">

      <button id="resetUniverseBtn">Reset</button>
    </div>

    <!-- TERMINAL -->
    <div class="panel">
      <div class="terminal" id="system-log">
        <div>[BOOT] System initialized</div>
      </div>

      <div class="input-line">
        <input id="commandInput" placeholder="Type command...">
      </div>
    </div>

  </div>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
