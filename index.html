<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PARAKLETOS — Cinematic Physics Engine</title>
<style>
  body { margin:0; overflow:hidden; background:black; }
  canvas { display:block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
/* ===========================
   SCENE SETUP
=========================== */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.015);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* ===========================
   BLOOM (CINEMATIC GLOW)
=========================== */
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.6,
  0.4,
  0.85
);
composer.addPass(bloom);

/* ===========================
   LIGHTING
=========================== */
const light = new THREE.PointLight(0xffffff, 2, 200);
scene.add(light);

/* ===========================
   BLACK HOLE CORE
=========================== */
const core = new THREE.Mesh(
  new THREE.SphereGeometry(2, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
scene.add(core);

/* ===========================
   ACCRETION DISK
=========================== */
const disk = new THREE.Mesh(
  new THREE.TorusGeometry(8, 1.5, 64, 200),
  new THREE.MeshBasicMaterial({
    color: 0xff5500,
    transparent: true,
    opacity: 0.6
  })
);
disk.rotation.x = Math.PI / 2;
scene.add(disk);

/* ===========================
   PARTICLE FIELD (STARS)
=========================== */
const particles = new THREE.BufferGeometry();
const count = 4000;
const positions = new Float32Array(count * 3);

for (let i = 0; i < count; i++) {
  positions[i*3] = (Math.random() - 0.5) * 200;
  positions[i*3+1] = (Math.random() - 0.5) * 200;
  positions[i*3+2] = (Math.random() - 0.5) * 200;
}

particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.6,
  color: 0xffffff
});

const starField = new THREE.Points(particles, particleMat);
scene.add(starField);

/* ===========================
   ENERGY STREAM (SPIRAL)
=========================== */
const spiralGeo = new THREE.BufferGeometry();
const spiralCount = 2000;
const spiralPos = new Float32Array(spiralCount * 3);

for (let i = 0; i < spiralCount; i++) {
  const angle = i * 0.1;
  const radius = 0.2 * i;

  spiralPos[i*3] = Math.cos(angle) * radius;
  spiralPos[i*3+1] = Math.sin(angle) * radius;
  spiralPos[i*3+2] = (Math.random() - 0.5) * 2;
}

spiralGeo.setAttribute('position', new THREE.BufferAttribute(spiralPos, 3));

const spiral = new THREE.Points(
  spiralGeo,
  new THREE.PointsMaterial({
    size: 0.8,
    color: 0xff00ff
  })
);
scene.add(spiral);

/* ===========================
   FAKE GRAVITATIONAL LENSING
=========================== */
const distortion = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform float time;

    void main(){
      vec2 center = vec2(0.5,0.5);
      float dist = distance(vUv, center);

      float warp = 0.04 / (dist + 0.2);
      vec2 uv = vUv + (vUv - center) * warp;

      float glow = 0.03 / dist;

      gl_FragColor = vec4(vec3(glow), 0.3);
    }
  `,
  transparent: true
});

const lens = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  distortion
);
scene.add(lens);

/* ===========================
   CAMERA MOTION (CINEMATIC)
=========================== */
let t = 0;

function moveCamera(){
  t += 0.0015;

  camera.position.x = Math.sin(t) * 45;
  camera.position.z = Math.cos(t) * 45;
  camera.position.y = Math.sin(t * 0.5) * 12;

  camera.lookAt(0,0,0);
}

/* ===========================
   ANIMATION LOOP
=========================== */
function animate(){
  requestAnimationFrame(animate);

  moveCamera();

  disk.rotation.z += 0.01;
  spiral.rotation.y += 0.002;

  core.scale.setScalar(1 + Math.sin(Date.now()*0.002)*0.05);

  distortion.uniforms.time.value += 0.01;

  composer.render();
}

animate();

/* ===========================
   RESIZE
=========================== */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
