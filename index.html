<!DOCTYPE html>
<html>
<head>
<title>PARAKLETOS — Cinematic Engine</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>

// =======================
// SCENE
// =======================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 25;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// =======================
// POST PROCESSING (GLOW)
// =======================
const composer = new THREE.EffectComposer(renderer);

const renderPass = new THREE.RenderPass(scene, camera);
composer.addPass(renderPass);

const bloom = new THREE.UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    1.8,  // strength
    1.0,  // radius
    0.1   // threshold
);
composer.addPass(bloom);

// =======================
// BLACK HOLE CORE
// =======================
const core = new THREE.Mesh(
    new THREE.SphereGeometry(1,64,64),
    new THREE.MeshBasicMaterial({ color:0x000000 })
);
scene.add(core);

// =======================
// ACCRETION DISK (🔥🔥🔥)
// =======================
const diskGeo = new THREE.TorusGeometry(5, 1.5, 64, 200);
const diskMat = new THREE.MeshBasicMaterial({
    color:0xff5500,
    wireframe:false
});
const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = Math.PI/2;
scene.add(disk);

// =======================
// PARTICLES
// =======================
const N = 1200;
const positions = new Float32Array(N * 3);
const velocities = [];

for(let i=0;i<N;i++){

    let r = Math.random()*12;

    positions[i*3] = (Math.random()-0.5)*r;
    positions[i*3+1] = (Math.random()-0.5)*r;
    positions[i*3+2] = (Math.random()-0.5)*r;

    velocities.push(new THREE.Vector3(
        (Math.random()-0.5)*0.03,
        (Math.random()-0.5)*0.03,
        (Math.random()-0.5)*0.03
    ));
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions,3));

const mat = new THREE.PointsMaterial({
    size:0.05,
    color:0xffaa33,
    transparent:true,
    opacity:0.9
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

// =======================
// LIGHT
// =======================
const light = new THREE.PointLight(0xff6600, 3, 100);
scene.add(light);

// =======================
// PHYSICS
// =======================
const G = 2.0;
const mass = 40;

function update(){

    let pos = geo.attributes.position.array;

    for(let i=0;i<N;i++){

        let x = pos[i*3];
        let y = pos[i*3+1];
        let z = pos[i*3+2];

        let dx = -x;
        let dy = -y;
        let dz = -z;

        let r = Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;

        let force = G*mass/(r*r);

        velocities[i].x += dx/r*force*0.01;
        velocities[i].y += dy/r*force*0.01;
        velocities[i].z += dz/r*force*0.01;

        pos[i*3] += velocities[i].x;
        pos[i*3+1] += velocities[i].y;
        pos[i*3+2] += velocities[i].z;

        // swirl
        let temp = velocities[i].x;
        velocities[i].x = -velocities[i].z;
        velocities[i].z = temp;

        if(r < 1.5){
            velocities[i].multiplyScalar(0.2);
        }
    }

    geo.attributes.position.needsUpdate = true;
}

// =======================
// CAMERA MOTION
// =======================
let t = 0;

function animate(){

    requestAnimationFrame(animate);

    update();

    // rotating disk
    disk.rotation.z += 0.01;

    t += 0.003;

    camera.position.x = Math.sin(t)*30;
    camera.position.z = Math.cos(t)*30;
    camera.lookAt(0,0,0);

    composer.render();
}

animate();

// =======================
window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
