<!DOCTYPE html>
<html>
<head>
<title>PARAKLETOS — INSANE MODE</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// =========================
// SETUP
// =========================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.025);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.z = 80;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// =========================
// LIGHT
// =========================
scene.add(new THREE.PointLight(0xff6600, 3, 400));

// =========================
// BLACK HOLE CORE
// =========================
const core = new THREE.Mesh(
  new THREE.SphereGeometry(4,64,64),
  new THREE.MeshBasicMaterial({ color:0x000000 })
);
scene.add(core);

// =========================
// NEBULA
// =========================
const nebula = new THREE.Mesh(
  new THREE.SphereGeometry(150,64,64),
  new THREE.MeshBasicMaterial({
    color:0x220044,
    transparent:true,
    opacity:0.05
  })
);
scene.add(nebula);

// =========================
// PARTICLES (100K)
// =========================
const N = 100000;

const geo = new THREE.BufferGeometry();
const positions = new Float32Array(N * 3);
const velocities = new Float32Array(N * 3);
const colors = new Float32Array(N * 3);

for(let i=0;i<N;i++){

  let i3 = i*3;

  let r = Math.random()*50;
  let angle = Math.random()*Math.PI*2;

  positions[i3] = Math.cos(angle)*r;
  positions[i3+1] = (Math.random()-0.5)*10;
  positions[i3+2] = Math.sin(angle)*r;

  velocities[i3] = (Math.random()-0.5)*0.02;
  velocities[i3+1] = (Math.random()-0.5)*0.02;
  velocities[i3+2] = (Math.random()-0.5)*0.02;

  let t = r/50;

  colors[i3] = 1-t;
  colors[i3+1] = 0.3;
  colors[i3+2] = t;
}

geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
geo.setAttribute('color', new THREE.BufferAttribute(colors,3));

const mat = new THREE.PointsMaterial({
  size:0.08,
  vertexColors:true,
  transparent:true,
  opacity:0.9
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

// =========================
// MOUSE GRAVITY
// =========================
let mouse = {x:0,y:0};

window.addEventListener('mousemove', e=>{
  mouse.x = (e.clientX/window.innerWidth-0.5)*100;
  mouse.y = (e.clientY/window.innerHeight-0.5)*100;
});

// =========================
// PHYSICS
// =========================
const G = 5.0;
const mass = 500;

function update(){

  let pos = geo.attributes.position.array;

  for(let i=0;i<N;i++){

    let i3 = i*3;

    let x = pos[i3];
    let y = pos[i3+1];
    let z = pos[i3+2];

    let dx = -x + mouse.x*0.2;
    let dy = -y + mouse.y*0.2;
    let dz = -z;

    let r = Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;

    let force = G*mass/(r*r);

    velocities[i3] += dx/r*force*0.005;
    velocities[i3+1] += dy/r*force*0.005;
    velocities[i3+2] += dz/r*force*0.005;

    pos[i3] += velocities[i3];
    pos[i3+1] += velocities[i3+1];
    pos[i3+2] += velocities[i3+2];

    // swirl
    let temp = velocities[i3];
    velocities[i3] = -velocities[i3+2];
    velocities[i3+2] = temp;

    if(r < 5){
      velocities[i3] *= 0.3;
      velocities[i3+1] *= 0.3;
      velocities[i3+2] *= 0.3;
    }
  }

  geo.attributes.position.needsUpdate = true;
}

// =========================
// CAMERA
// =========================
let t = 0;

function moveCamera(){
  t += 0.001;

  camera.position.x = Math.sin(t)*120;
  camera.position.z = Math.cos(t)*120;
  camera.position.y = Math.sin(t*0.7)*40;

  camera.lookAt(0,0,0);
}

// =========================
// LOOP
// =========================
function animate(){
  requestAnimationFrame(animate);

  update();
  moveCamera();

  core.scale.setScalar(1 + Math.sin(Date.now()*0.002)*0.2);

  nebula.rotation.y += 0.0003;

  renderer.render(scene,camera);
}

animate();

// =========================
window.addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
