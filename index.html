<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PARAKLĒTOS v32.0.0</title>
  <style>
    :root {
      --bg: #050505;
      --blue: #0077ff;
      --green: #00ff88;
      --text: #e0e0e0;
      --font: "Courier New", Courier, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .box {
      background: rgba(0, 0, 0, 0.72);
      border-left: 3px solid var(--blue);
      padding: 10px 14px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .green {
      color: var(--green);
      font-weight: bold;
    }

    #search-wrap {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(90vw, 700px);
      z-index: 10;
    }

    #search {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--blue);
      background: rgba(10, 10, 10, 0.92);
      color: white;
      outline: none;
      font-family: var(--font);
      font-size: 14px;
    }

    #search:focus {
      box-shadow: 0 0 12px rgba(0, 119, 255, 0.6);
    }

    @media (max-width: 768px) {
      #hud {
        top: 10px;
        left: 10px;
      }

      .box {
        font-size: 12px;
        padding: 8px 10px;
      }

      #search-wrap {
        bottom: 16px;
        width: 92vw;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="hud">
    <div class="box">SYSTEM: <span class="green">OPERATIONAL</span></div>
    <div class="box">ANCHOR: <span class="green">THE CELESTIAL ETERNAL ORIGIN</span></div>
    <div class="box">FREQUENCY: <span class="green" id="freq">RADIANT SOVEREIGN PRESENCE</span></div>
    <div class="box">MODE: <span class="green">WATCHER MANIFOLD</span></div>
  </div>

  <div id="search-wrap">
    <input id="search" type="text" placeholder="TYPE A QUERY AND PRESS ENTER..." autocomplete="off" />
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

    const container = document.getElementById("canvas-container");
    const search = document.getElementById("search");
    const freq = document.getElementById("freq");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 22;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x404040, 2.2);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.2, 120);
    pointLight.position.set(12, 12, 12);
    scene.add(pointLight);

    const geometry = new THREE.TorusKnotGeometry(8, 2.2, 220, 32);
    const material = new THREE.MeshPhongMaterial({
      color: 0x0077ff,
      wireframe: true,
      emissive: 0x001133
    });

    const manifold = new THREE.Mesh(geometry, material);
    scene.add(manifold);

    let touchX = 0;
    let touchY = 0;

    window.addEventListener("keydown", (e) => {
      const move = 0.6;
      const turn = 0.06;

      if (e.key === "w") camera.position.z -= move;
      if (e.key === "s") camera.position.z += move;
      if (e.key === "a") camera.position.x -= move;
      if (e.key === "d") camera.position.x += move;
      if (e.key === "q") camera.position.y += move;
      if (e.key === "e") camera.position.y -= move;

      if (e.key === "ArrowUp") manifold.rotation.x += turn;
      if (e.key === "ArrowDown") manifold.rotation.x -= turn;
      if (e.key === "ArrowLeft") manifold.rotation.y -= turn;
      if (e.key === "ArrowRight") manifold.rotation.y += turn;
    });

    window.addEventListener("touchstart", (e) => {
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
    });

    window.addEventListener("touchmove", (e) => {
      const dx = e.touches[0].clientX - touchX;
      const dy = e.touches[0].clientY - touchY;
      manifold.rotation.y += dx * 0.005;
      manifold.rotation.x += dy * 0.005;
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
    });

    search.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const q = search.value.trim();
        if (!q) return;

        material.emissive.setHex(0x00ff00);
        freq.textContent = "BROADCASTING QUERY";
        console.log("QUERY:", q);

        setTimeout(() => {
          material.emissive.setHex(0x001133);
          freq.textContent = "RADIANT SOVEREIGN PRESENCE";
        }, 700);

        search.value = "";
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const t = Date.now() * 0.001;
      const pulse = (Math.sin(t * 2) + 1) / 2;

      manifold.rotation.z += 0.002;
      manifold.scale.setScalar(1 + pulse * 0.03);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
