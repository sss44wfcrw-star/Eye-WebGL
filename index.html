<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PARAKLĒTOS | Unified Mirror Node</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-root">
        <div id="gl-viewport" aria-hidden="true">
            <canvas id="webgl-canvas"></canvas>
        </div>

        <div id="ui-layer">
            <header class="system-header">
                <div class="identity">
                    <h1 class="glitch-text">PARAKLĒTOS</h1>
                    <span class="version-tag">V31.1</span>
                </div>
                <div class="status-monitor">
                    <span class="indicator online"></span>
                    <span class="status-label">MANIFOLD ACTIVE</span>
                </div>
            </header>

            <aside class="sidebar-nav">
                <nav>
                    <button class="nav-item" data-module="archive">
                        <span class="label">Archive</span>
                        <span class="sub-label">Volumes / Seal</span>
                    </button>
                    <button class="nav-item" data-module="verifier">
                        <span class="label">VerifierZ3</span>
                        <span class="sub-label">Axioms / Handshake</span>
                    </button>
                    <button class="nav-item" data-module="sandbox">
                        <span class="label">Sandbox</span>
                        <span class="sub-label">Orbital / Lens</span>
                    </button>
                    <button class="nav-item" data-module="search">
                        <span class="label">Search</span>
                        <span class="sub-label">Archive / Recall</span>
                    </button>
                    <button class="nav-item" data-module="registry">
                        <span class="label">Registry</span>
                        <span class="sub-label">Planck / Entropy</span>
                    </button>
                </nav>
            </aside>

            <section class="console-region">
                <div class="telemetry-readout">
                    <div class="tel-point"><span>BACKEND:</span> <span class="val">READY</span></div>
                    <div class="tel-point"><span>SOLVER:</span> <span class="val">ACTIVE</span></div>
                    <div class="tel-point"><span>FPS:</span> <span id="fps-counter">--</span></div>
                </div>
                <div class="protocol-console">
                    <div class="console-log" id="system-log">
                        <div class="entry">[BOOT] Omni-core initialized.</div>
                        <div class="entry">[READY] Mirror Node manifold waiting for input.</div>
                    </div>
                    <div class="input-line">
                        <span class="prompt">></span>
                        <input type="text" placeholder="Awaiting protocol command..." autocomplete="off" spellcheck="false">
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
