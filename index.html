<!DOCTYPE html>
<html>
<head>
<title>PARAKLETOS — CHAOS ENGINE</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// =========================
// SCENE
// =========================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.03);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.z = 60;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// =========================
// LIGHT
// =========================
const light = new THREE.PointLight(0xff6600, 3, 300);
scene.add(light);

// =========================
// BLACK HOLE
// =========================
const core = new THREE.Mesh(
  new THREE.SphereGeometry(3,64,64),
  new THREE.MeshBasicMaterial({ color:0x000000 })
);
scene.add(core);

// =========================
// NEBULA CLOUDS
// =========================
const cloudGeo = new THREE.SphereGeometry(80,64,64);
const cloudMat = new THREE.MeshBasicMaterial({
  color:0x220044,
  transparent:true,
  opacity:0.08
});
const cloud = new THREE.Mesh(cloudGeo, cloudMat);
scene.add(cloud);

// =========================
// GALAXY PARTICLES
// =========================
const N = 3000;
const geo = new THREE.BufferGeometry();
const positions = new Float32Array(N*3);
const colors = [];
const velocities = [];

for(let i=0;i<N;i++){

  let angle = i * 0.02;
  let radius = Math.sqrt(i)*0.4;

  positions[i*3] = Math.cos(angle)*radius;
  positions[i*3+1] = (Math.random()-0.5)*2;
  positions[i*3+2] = Math.sin(angle)*radius;

  velocities.push(new THREE.Vector3(0,0,0));

  let t = radius/20;

  colors.push(1-t, 0.5, t); // gradient color
}

geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
geo.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));

const mat = new THREE.PointsMaterial({
  size:0.15,
  vertexColors:true,
  transparent:true,
  opacity:0.9
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

// =========================
// STARFIELD
// =========================
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(2000*3);

for(let i=0;i<2000;i++){
  starPos[i*3] = (Math.random()-0.5)*1000;
  starPos[i*3+1] = (Math.random()-0.5)*1000;
  starPos[i*3+2] = (Math.random()-0.5)*1000;
}

starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));

scene.add(new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({ size:1, color:0xffffff })
));

// =========================
// PHYSICS
// =========================
const G = 4.0;
const mass = 200;

function update(){

  let pos = geo.attributes.position.array;

  for(let i=0;i<N;i++){

    let x = pos[i*3];
    let y = pos[i*3+1];
    let z = pos[i*3+2];

    let dx = -x;
    let dy = -y;
    let dz = -z;

    let r = Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;

    let force = G*mass/(r*r);

    velocities[i].x += dx/r*force*0.01;
    velocities[i].y += dy/r*force*0.01;
    velocities[i].z += dz/r*force*0.01;

    pos[i*3] += velocities[i].x;
    pos[i*3+1] += velocities[i].y;
    pos[i*3+2] += velocities[i].z;

    // swirl chaos
    let temp = velocities[i].x;
    velocities[i].x = -velocities[i].z;
    velocities[i].z = temp;

    if(r < 4){
      velocities[i].multiplyScalar(0.2);
    }
  }

  geo.attributes.position.needsUpdate = true;
}

// =========================
// CAMERA (INSANE MOTION)
// =========================
let t = 0;

function moveCamera(){
  t += 0.002;

  camera.position.x = Math.sin(t)*80;
  camera.position.z = Math.cos(t)*80;
  camera.position.y = Math.sin(t*0.7)*25;

  camera.lookAt(0,0,0);
}

// =========================
// LOOP
// =========================
function animate(){
  requestAnimationFrame(animate);

  update();
  moveCamera();

  cloud.rotation.y += 0.0005;

  core.scale.setScalar(1 + Math.sin(Date.now()*0.002)*0.1);

  renderer.render(scene,camera);
}

animate();

// =========================
window.addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
