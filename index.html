<!DOCTYPE html>
<html>
<head>
<title>PARAKLETOS — Realistic Engine</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>

// =======================
// SCENE
// =======================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.z = 40;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// =======================
// BLOOM (SOFT REAL GLOW)
// =======================
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloom = new THREE.UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    1.2,
    0.8,
    0.2
);
composer.addPass(bloom);

// =======================
// BLACK HOLE CORE
// =======================
const core = new THREE.Mesh(
    new THREE.SphereGeometry(1.5,64,64),
    new THREE.MeshBasicMaterial({ color:0x000000 })
);
scene.add(core);

// =======================
// ACCRETION DISK (GRADIENT)
// =======================
const diskGeo = new THREE.TorusGeometry(7, 2, 64, 300);

const diskMat = new THREE.MeshBasicMaterial({
    color:0xffaa33,
    transparent:true,
    opacity:0.8
});

const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = Math.PI/2;
scene.add(disk);

// =======================
// STARFIELD (REAL DEPTH)
// =======================
const starsGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPos = new Float32Array(starCount * 3);

for(let i=0;i<starCount;i++){
    starPos[i*3] = (Math.random()-0.5)*1000;
    starPos[i*3+1] = (Math.random()-0.5)*1000;
    starPos[i*3+2] = (Math.random()-0.5)*1000;
}

starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));

const starsMat = new THREE.PointsMaterial({
    size:0.8,
    color:0xffffff
});

const starField = new THREE.Points(starsGeo, starsMat);
scene.add(starField);

// =======================
// PARTICLES (REALISTIC)
// =======================
const N = 1500;
const positions = new Float32Array(N * 3);
const velocities = [];
const colors = [];

for(let i=0;i<N;i++){

    let r = Math.random()*15;

    let x = (Math.random()-0.5)*r;
    let y = (Math.random()-0.5)*r;
    let z = (Math.random()-0.5)*r;

    positions[i*3] = x;
    positions[i*3+1] = y;
    positions[i*3+2] = z;

    velocities.push(new THREE.Vector3(
        (Math.random()-0.5)*0.02,
        (Math.random()-0.5)*0.02,
        (Math.random()-0.5)*0.02
    ));

    // COLOR BASED ON DISTANCE (REALISM)
    let dist = Math.sqrt(x*x+y*y+z*z);

    if(dist < 4){
        colors.push(1,0.5,0.1); // hot (orange)
    } else if(dist < 8){
        colors.push(1,1,0.6); // warm (yellow)
    } else {
        colors.push(0.6,0.8,1); // cool (blue)
    }
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
geo.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));

const mat = new THREE.PointsMaterial({
    size:0.12,
    vertexColors:true,
    transparent:true,
    opacity:0.9
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

// =======================
// LIGHT
// =======================
const light = new THREE.PointLight(0xffaa33, 2, 200);
scene.add(light);

// =======================
// PHYSICS
// =======================
const G = 1.8;
const mass = 60;

function update(){

    let pos = geo.attributes.position.array;

    for(let i=0;i<N;i++){

        let x = pos[i*3];
        let y = pos[i*3+1];
        let z = pos[i*3+2];

        let dx = -x;
        let dy = -y;
        let dz = -z;

        let r = Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;

        let force = G*mass/(r*r);

        velocities[i].x += dx/r*force*0.008;
        velocities[i].y += dy/r*force*0.008;
        velocities[i].z += dz/r*force*0.008;

        pos[i*3] += velocities[i].x;
        pos[i*3+1] += velocities[i].y;
        pos[i*3+2] += velocities[i].z;

        // orbit swirl
        let temp = velocities[i].x;
        velocities[i].x = -velocities[i].z;
        velocities[i].z = temp;

        if(r < 2){
            velocities[i].multiplyScalar(0.3);
        }
    }

    geo.attributes.position.needsUpdate = true;
}

// =======================
// CAMERA (SMOOTH CINEMA)
// =======================
let t = 0;

function animate(){

    requestAnimationFrame(animate);

    update();

    disk.rotation.z += 0.004;

    t += 0.002;

    camera.position.x = Math.sin(t)*40;
    camera.position.z = Math.cos(t)*40;
    camera.position.y = Math.sin(t*0.5)*10;

    camera.lookAt(0,0,0);

    composer.render();
}

animate();

// =======================
window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
